repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Format Python files with Ruff
        entry: poetry run ruff format
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-lint
        name: Lint Python files with Ruff
        entry: poetry run ruff check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: mypy
        name: Type-check with MyPy
        entry: poetry run mypy app
        language: system
        types: [python]
        pass_filenames: false

      - id: alembic-db-up-to-date
        name: Ensure Alembic DB schema is up-to-date
        entry: bash -c 'poetry run alembic heads | grep -q $(poetry run alembic current | grep -oE "[a-f0-9]{12,}")'
        language: system
        types: [python]
        pass_filenames: false
